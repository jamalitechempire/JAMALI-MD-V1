<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>jamali Tech Empire · Admin jamali tech</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap');

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #0a0c12;
  font-family: 'Inter', sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow-x: hidden;
  padding: 1.5rem;
}

/* ------- DYNAMIC EMPIRE BACKGROUND ------- */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: 
    radial-gradient(circle at 20% 30%, rgba(240, 165, 0, 0.12), transparent 55%),
    radial-gradient(circle at 85% 70%, rgba(0, 255, 234, 0.08), transparent 60%),
    radial-gradient(circle at 40% 80%, rgba(212, 175, 55, 0.1), transparent 45%),
    repeating-linear-gradient(45deg, rgba(255,215,0,0.02) 0px, rgba(255,215,0,0.02) 2px, transparent 2px, transparent 8px);
  animation: empireDrift 32s infinite alternate ease-in-out;
  z-index: -2;
}

body::after {
  content: "";
  position: fixed;
  inset: 0;
  background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" opacity="0.08"><path fill="none" stroke="%23f0a500" stroke-width="1.2" d="M150 200 L250 150 L350 200 L400 280 L350 350 L250 400 L150 350 L100 280 L150 200Z M500 500 L580 470 L650 520 L630 610 L540 620 L480 580 L500 500Z M50 650 L120 620 L180 660 L140 730 L60 730 L30 670 L50 650Z"/><circle cx="700" cy="180" r="12" stroke="%23ffd966" fill="none" stroke-width="1.5"/><circle cx="80" cy="420" r="18" stroke="%23f0a500" fill="none" stroke-width="1"/></svg>') repeat;
  background-size: 180px;
  pointer-events: none;
  z-index: -1;
  opacity: 0.35;
}

@keyframes empireDrift {
  0% { transform: scale(1) rotate(0deg); opacity: 0.7; }
  100% { transform: scale(1.05) rotate(3deg); opacity: 1; }
}

/* ---------- CARD : EMPIRE THRONE ---------- */
.login-card {
  background: rgba(18, 20, 28, 0.86);
  backdrop-filter: blur(12px);
  border-radius: 2.5rem;
  padding: 2.2rem 2rem 2.5rem;
  width: 100%;
  max-width: 440px;
  text-align: center;
  border: 1px solid rgba(240, 165, 0, 0.4);
  box-shadow: 0 25px 45px rgba(0,0,0,0.5), 0 0 0 1px rgba(240, 165, 0, 0.2) inset, 0 0 28px rgba(240, 165, 0, 0.25);
  transition: all 0.3s ease;
}

.login-card:hover {
  border-color: rgba(240, 165, 0, 0.7);
  box-shadow: 0 30px 50px rgba(0,0,0,0.6), 0 0 0 1.5px rgba(240, 180, 50, 0.5) inset, 0 0 38px rgba(240, 165, 0, 0.4);
}

/* empire header section */
.empire-badge {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.7rem;
  margin-bottom: 0.5rem;
}

.empire-badge i {
  font-size: 2.3rem;
  color: #f0b90b;
  text-shadow: 0 0 8px #f0b90b;
}

.login-card h2 {
  font-size: 1.9rem;
  font-weight: 800;
  background: linear-gradient(135deg, #FFE6B0, #F0B90B, #E09D00);
  background-clip: text;
  -webkit-background-clip: text;
  color: transparent;
  letter-spacing: -0.3px;
  margin-bottom: 0.4rem;
  text-shadow: 0 2px 3px rgba(0,0,0,0.2);
}

.empire-sub {
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 2px;
  font-weight: 500;
  color: #cdb38c;
  border-top: 1px dashed rgba(240, 185, 11, 0.5);
  display: inline-block;
  padding-top: 0.5rem;
  margin-top: 0.15rem;
  margin-bottom: 1.8rem;
}

/* ----- GOLDEN INPUTS ----- */
.input-group {
  margin: 0.75rem 0;
  position: relative;
}

.input-group i {
  position: absolute;
  left: 18px;
  top: 50%;
  transform: translateY(-50%);
  color: #f0b90b;
  font-size: 1.1rem;
  opacity: 0.7;
  transition: 0.2s;
}

.login-card input {
  width: 100%;
  background: #111217;
  border: 1.5px solid #2a2a33;
  border-radius: 2rem;
  padding: 0.9rem 1rem 0.9rem 3rem;
  font-size: 1rem;
  font-weight: 500;
  color: #f0ede8;
  transition: all 0.25s ease;
  font-family: 'Inter', monospace;
}

.login-card input:focus {
  outline: none;
  border-color: #f0b90b;
  background: #0c0c12;
  box-shadow: 0 0 0 3px rgba(240, 185, 11, 0.25), 0 0 12px rgba(240, 185, 11, 0.3);
}

.login-card input::placeholder {
  color: #5e5a6e;
  font-weight: 400;
  letter-spacing: -0.2px;
}

/* ----- EMPIRE BUTTON (ASCEND) ----- */
.ascend-btn {
  width: 100%;
  background: linear-gradient(105deg, #d99e04, #f0b90b, #f5c542);
  border: none;
  border-radius: 3rem;
  padding: 0.9rem;
  margin-top: 1.5rem;
  font-size: 1.15rem;
  font-weight: 800;
  font-family: 'Inter', sans-serif;
  color: #0a0a10;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.7rem;
  cursor: pointer;
  transition: 0.25s;
  box-shadow: 0 6px 14px rgba(0,0,0,0.3), 0 0 6px rgba(240, 185, 11, 0.6);
  letter-spacing: 0.5px;
}

.ascend-btn i {
  font-size: 1.1rem;
  transition: transform 0.2s;
}

.ascend-btn:hover {
  background: linear-gradient(105deg, #f0b90b, #f5c542, #ffda77);
  box-shadow: 0 8px 20px rgba(240, 185, 11, 0.5), 0 0 12px #f0b90b;
  transform: translateY(-1px);
}

.ascend-btn:active {
  transform: translateY(1px);
}

.ascend-btn:disabled {
  background: #6f5a2c;
  box-shadow: none;
  cursor: not-allowed;
  opacity: 0.6;
  transform: none;
}

/* error message style */
.error {
  color: #ffb347;
  background: rgba(30, 20, 10, 0.7);
  backdrop-filter: blur(4px);
  margin-top: 1rem;
  padding: 0.6rem;
  border-radius: 2rem;
  font-size: 0.8rem;
  font-weight: 600;
  border-left: 3px solid #ffb347;
  text-align: center;
  letter-spacing: 0.2px;
  transition: 0.2s;
}

.empire-footer {
  margin-top: 2rem;
  font-size: 0.7rem;
  color: #7f7a6e;
  display: flex;
  justify-content: center;
  gap: 0.8rem;
  align-items: center;
  border-top: 1px solid rgba(240, 185, 11, 0.25);
  padding-top: 1rem;
}

.empire-footer span i {
  font-size: 0.7rem;
  margin-right: 4px;
  color: #f0b90b;
}

/* responsive */
@media (max-width: 500px) {
  .login-card {
    padding: 1.8rem 1.5rem;
    max-width: 94%;
  }
  .login-card h2 {
    font-size: 1.6rem;
  }
  .empire-badge i {
    font-size: 1.8rem;
  }
}
</style>
</head>
<body>

<div class="login-card">
  <div class="empire-badge">
    <i class="fas fa-crown"></i>
    <i class="fas fa-microchip"></i>
  </div>
  <h2>JAMALI<br>TECH EMPIRE</h2>
  <div class="empire-sub">⚡ SECURE ADMIN JEI TECH ⚡</div>

  <form id="login-form">
    <div class="input-group">
      <i class="fas fa-user-astronaut"></i>
      <input type="text" id="username" placeholder="Imperial Credential / ID" autocomplete="username" required />
    </div>
    <div class="input-group">
      <i class="fas fa-key"></i>
      <input type="password" id="password" placeholder="Access Cypher" autocomplete="current-password" required />
    </div>
    <button type="submit" class="ascend-btn" id="loginBtn">
      <i class="fas fa-fingerprint"></i> ENTER THE EMPIRE <i class="fas fa-arrow-right"></i>
    </button>
    <div class="error" id="error-msg"></div>
  </form>
  <div class="empire-footer">
    <span><i class="fas fa-shield-alt"></i> encrypted channel</span>
    <span><i class="fas fa-lock"></i> jamali.sec</span>
  </div>
</div>

<script>
// ----- Client-Side Session Guard & Enhanced UX (preserves original API) -----
const form = document.getElementById('login-form');
const usernameInput = document.getElementById('username');
const passwordInput = document.getElementById('password');
const errorDiv = document.getElementById('error-msg');
const loginBtn = document.getElementById('loginBtn');

let isSubmitting = false;

// Helper to reset button state
function resetButtonState() {
  if (loginBtn) {
    loginBtn.disabled = false;
    loginBtn.innerHTML = `<i class="fas fa-fingerprint"></i> ENTER THE EMPIRE <i class="fas fa-arrow-right"></i>`;
  }
}

function setLoadingState() {
  if (loginBtn) {
    loginBtn.disabled = true;
    loginBtn.innerHTML = `<i class="fas fa-spinner fa-pulse"></i> VERIFYING CREDENTIALS...`;
  }
}

// show error with empire vibe
function showError(message) {
  errorDiv.textContent = message || 'Access denied. Check credentials.';
  // auto clear after 3.5 sec, but keep visible until next attempt
  setTimeout(() => {
    if (errorDiv.textContent === message) {
      // but only clear if same error hasn't been replaced
      if(!isSubmitting) errorDiv.textContent = '';
    }
  }, 3800);
}

// handle login form POST
form.addEventListener('submit', async (e) => {
  e.preventDefault();
  if (isSubmitting) return;
  
  const username = usernameInput.value.trim();
  const password = passwordInput.value;
  
  if (!username || !password) {
    showError('⚠️ Both credentials required to enter the Empire.');
    return;
  }
  
  isSubmitting = true;
  setLoadingState();
  errorDiv.textContent = ''; // clear previous errors
  
  try {
    const response = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    
    const data = await response.json();
    
    if (data && data.success === true) {
      // successful authentication -> redirect to admin dashboard
      window.location.href = '/admin';
      return; // redirect will happen, prevent further execution
    } else {
      // login failed: show meaningful message from backend or default
      const errMsg = data && data.message ? data.message : 'Invalid imperial credentials. Access revoked.';
      showError(`❌ ${errMsg}`);
      resetButtonState();
      isSubmitting = false;
      // Shake effect on card for dramatic feedback (optional)
      const card = document.querySelector('.login-card');
      card.style.transform = 'translateX(6px)';
      setTimeout(() => { if(card) card.style.transform = ''; }, 120);
    }
  } catch (err) {
    console.error('Empire login endpoint error:', err);
    showError('⚠️ Gateway error. The Empire’s security core is unreachable. Retry.');
    resetButtonState();
    isSubmitting = false;
  } finally {
    // if not redirected (fail case), we already reset. If success, redirect kills execution.
    if (isSubmitting && !window.location.pathname.includes('/admin')) {
      // ensure button is restored only if still on login page after fail/error
      if(document.querySelector('.login-card')) {
        resetButtonState();
        isSubmitting = false;
      }
    }
  }
});

// ---------- Session validation: if already authenticated, forward to admin panel ----------
window.addEventListener('DOMContentLoaded', async () => {
  // Small elegant loader state (optional) but not intrusive
  try {
    const sessionCheck = await fetch('/api/check-session', {
      method: 'GET',
      headers: { 'Cache-Control': 'no-cache' }
    });
    const sessionData = await sessionCheck.json();
    if (sessionData && sessionData.loggedIn === true) {
      // already logged in => redirect to admin area
      window.location.href = '/admin';
    }
  } catch (err) {
    // session check fails silently, show login interface as usual (no interruption)
    console.debug('session check not available, continuing to login page');
  }
  
  // additional micro-interaction: dynamic field focus effect
  const inputs = document.querySelectorAll('.input-group input');
  inputs.forEach(input => {
    input.addEventListener('focus', () => {
      const parent = input.closest('.input-group');
      if(parent) parent.style.transform = 'scale(1.01)';
    });
    input.addEventListener('blur', () => {
      const parent = input.closest('.input-group');
      if(parent) parent.style.transform = '';
    });
  });
});

// Edge protection: if error div is cleared after submit, reset state if needed but avoid double-redirect
window.addEventListener('pageshow', (event) => {
  if (event.persisted) {
    // recovered from bfcache, reset any stuck states
    resetButtonState();
    isSubmitting = false;
    errorDiv.textContent = '';
  }
});
</script>

<!-- subtle auto-focus on first field for better UX -->
<script>
  (function setInitialFocus() {
    if (document.getElementById('username') && !window.location.pathname.includes('/admin')) {
      setTimeout(() => {
        const uname = document.getElementById('username');
        if(uname && document.activeElement !== uname) uname.focus();
      }, 100);
    }
  })();
</script>
</body>
</
